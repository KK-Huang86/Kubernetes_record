apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    server {
        listen 80;

        location / {
            proxy_pass http://web-server-service.{{ .Release.Namespace }}.svc.cluster.local:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
