apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: task1
  name: web-server-new
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
        - name: nginx-proxy
          image: my-nginx-proxy:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
