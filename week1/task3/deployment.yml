apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: task1
  name: web-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.14.2
          ports:
            - containerPort: 80
          lifecycle:
            postStart:
              exec:
                command: ["touch", "/tmp/ready"]
          readinessProbe:
            exec:
              command: ["cat", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
