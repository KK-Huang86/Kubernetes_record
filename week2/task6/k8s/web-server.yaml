apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: week2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
        - name: web-server
          image: vup4k0806/web-server0316:v2
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: redis-secret
---
apiVersion: v1
kind: Service
metadata:
  name: web-server-service
  namespace: week2
spec:
  selector:
    app: web-server
  ports:
    - port: 8000
      targetPort: 8000
