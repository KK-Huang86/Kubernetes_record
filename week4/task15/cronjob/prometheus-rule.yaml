apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cpu-alerts
  namespace: task15
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: cpu.rules
      rules:
        - alert: ContainerHighCPU
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="task15", container!=""}[1m])) by (pod, container)
              /
              sum(kube_pod_container_resource_limits{namespace="task15", resource="cpu", container!=""}) by (pod, container)
            ) * 100 > 80
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container CPU 超過 80%"
            description: "Pod {{ $labels.pod }} 的 container {{ $labels.container }} CPU 使用率超過 80%，目前為 {{ $value | printf \"%.1f\" }}%"
