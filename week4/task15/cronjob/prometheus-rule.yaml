apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cpu-alerts
  namespace: task15
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: cpu.rules
      rules:
        - alert: ContainerHighCPU
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="task15", cpu="total"}[1m])) by (pod, namespace) > 0.8
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} CPU 超過 80%"
            description: "Pod {{ $labels.pod }}（namespace: {{ $labels.namespace }}）CPU 使用率過高，目前為 {{ $value | printf \"%.2f\" }} 核心"
