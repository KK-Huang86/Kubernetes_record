apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cronjob
  namespace: task15
spec:
  schedule: "*/1 * * * *"  # 每分鐘執行一次
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: my-cronjob-app
              image: vup4k0806/my-cronjob-app:v1
          restartPolicy: Never
